<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk Interaktif</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
    .container{max-width:1200px;margin:auto;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
    .card,.modal-content{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .card{padding:16px;cursor:pointer}
    .img{height:220px;background:#eaeaea;border-radius:10px;display:flex;align-items:center;justify-content:center}
    .price{font-size:22px;font-weight:bold;color:#d00;margin:8px 0}
    .desc{font-size:14px;color:#444;line-height:1.6}
    button{background:#d00;color:#fff;border:none;padding:12px 18px;border-radius:8px;cursor:pointer}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);padding:30px;z-index:99}
    .modal-content{max-width:900px;margin:auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .thumbs{display:flex;gap:10px;margin-top:10px}
    .thumb{width:60px;height:60px;background:#eee;border-radius:8px}
    input,textarea{width:100%;padding:10px;margin-top:8px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="container">
  <div style="background:linear-gradient(90deg,#0f2027,#2c5364);color:#fff;padding:30px;border-radius:14px;margin-bottom:20px;text-align:center">
  <h1 style="margin:0;font-size:32px">JAIFY</h1>
  <p style="margin:5px 0 0 0;font-size:18px">Sales: Doni Romdoni</p>
  <h2 style="margin-top:10px">Katalog Produk</h2>
</div>
  <div class="grid" id="catalog"></div>
</div>

<div class="modal" id="productModal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const products = [
  {
    nama:'JAIFY M2-3MP Smart Indoor CCTV',
    harga:501000,
    materi:'Camera indoor PTZ 2K+, panorama 360°, two-way talk, full color night vision, garansi 1 tahun',
    gambar:'Gambar Produk'
  }
];

function renderCatalog(){
  document.getElementById('catalog').innerHTML = products.map((p,i)=>`
    <div class="card" onclick="showDetail(${i})">
      <div class="img">${p.gambar}</div>
      <h3>${p.nama}</h3>
      <div class="desc">${p.materi}</div>
      <div class="price">Rp ${p.harga.toLocaleString('id-ID')}</div>
    </div>
  `).join('');
}

function showDetail(index){
  const p = products[index];
  document.getElementById('modalContent').innerHTML = `
    <div>
      <div class="img" style="height:340px">${p.gambar}</div>
      <div class="thumbs">
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
      </div>
      <p class="desc" style="margin-top:15px"><b>Deskripsi:</b><br>${p.materi}</p>
    </div>
    <div>
      <h2>${p.nama}</h2>
      <div class="price">Rp ${p.harga.toLocaleString('id-ID')}</div>
      <p>Produk original • Garansi resmi • Siap kirim</p>
      <input type="text" id="custName" placeholder="Nama lengkap wajib diisi">
      <textarea id="custAddress" placeholder="Alamat lengkap wajib diisi"></textarea>
      <input type="text" id="custPhone" placeholder="Nomor HP wajib diisi">
      <input type="number" id="qty" value="1" min="1">
      <button onclick="buyNow('${p.nama}', ${p.harga})">Beli Sekarang</button>
      <button style="background:#555;margin-left:8px" onclick="closeModal()">Tutup</button>
    </div>
  `;
  document.getElementById('productModal').style.display='block';
}

function closeModal(){
  document.getElementById('productModal').style.display='none';
}

function buyNow(nama,harga){
  const nm = document.getElementById('custName').value.trim();
  const al = document.getElementById('custAddress').value.trim();
  const hp = document.getElementById('custPhone').value.trim();
  const qty = Number(document.getElementById('qty').value || 1);
  if(!nm || !al || !hp){
    alert('Nama, alamat, dan nomor HP wajib diisi');
    return;
  }
  const pesan = encodeURIComponent(`Halo, saya ingin membeli ${nama}\nNama: ${nm}\nAlamat: ${al}\nHP: ${hp}\nJumlah: ${qty}\nTotal: Rp ${(harga*qty).toLocaleString('id-ID')}`);
  window.open(`https://wa.me/6281293632293?text=${pesan}`,'_blank');
}

window.onclick = function(e){
  if(e.target.id === 'productModal') closeModal();
}

renderCatalog();

function updateTotalHarga(harga){
  const qtyEl = document.getElementById('qty');
  const totalEl = document.getElementById('autoTotal');
  if(qtyEl && totalEl){
    const total = harga * Number(qtyEl.value || 1);
    totalEl.innerText = 'Rp ' + total.toLocaleString('id-ID');
  }
}

function buyNow(nama,harga){
  const qty = Number(document.getElementById('qty').value || 1);
  document.getElementById('modalContent').innerHTML = `
    <div>
      <div class="img" style="height:260px">Preview Produk</div>
      <h3>${nama}</h3>
      <p>Harga satuan: Rp ${harga.toLocaleString('id-ID')}</p>
      <p>Total beli: <b id="autoTotal">Rp ${(harga*qty).toLocaleString('id-ID')}</b></p>
    </div>
    <div>
      <h2>Form Pemesanan</h2>
      <input type="text" id="custName" placeholder="Nama lengkap wajib diisi">
      <textarea id="custAddress" placeholder="Alamat lengkap wajib diisi"></textarea>
      <input type="text" id="custPhone" placeholder="Nomor HP wajib diisi">
      <button onclick="finishOrder('${nama}', ${harga}, ${qty})">Selesai</button>
    </div>
  `;
}

function finishOrder(nama,harga,qty){
  const nm = document.getElementById('custName').value.trim();
  const al = document.getElementById('custAddress').value.trim();
  const hp = document.getElementById('custPhone').value.trim();
  if(!nm || !al || !hp){
    alert('Nama, alamat, dan nomor HP wajib diisi');
    return;
  }
  const invoice = 'INV-' + Date.now();
  document.getElementById('modalContent').innerHTML = `
    <div style="grid-column:1 / span 2;text-align:center;padding:30px">
      <h2>Pesanan Sedang Diproses</h2>
      <p>Invoice: <b>${invoice}</b></p>
      <p>Nama: ${nm}</p>
      <p>Alamat: ${al}</p>
      <p>No HP: ${hp}</p>
      <p>Produk: ${nama}</p>
      <p>Jumlah: ${qty}</p>
      <p>Total: Rp ${(harga*qty).toLocaleString('id-ID')}</p>
      <div style="margin-top:20px">
        <div style="width:60px;height:60px;border:6px solid #ddd;border-top:6px solid #d00;border-radius:50%;margin:0 auto;animation:spin 1s linear infinite"></div>
        <p style="margin-top:15px;font-weight:bold">Status: Sedang diproses...</p>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
