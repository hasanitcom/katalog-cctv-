<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk + Order Form</title>
  <style>
    body{font-family:Arial,sans-serif;margin:20px;background:#f5f5f5}
    .container{max-width:1200px;margin:auto}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
    .card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
    .img{height:220px;background:#eaeaea;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .price{font-size:20px;font-weight:bold;margin:10px 0}
    .desc{font-size:14px;line-height:1.5}
    input,button,textarea{width:100%;padding:10px;margin-top:8px;box-sizing:border-box;border-radius:8px;border:1px solid #ccc}
    .qty-wrap{display:flex;gap:10px;align-items:center;margin-top:10px}
    .qty-wrap input{width:90px}
    button{background:#111;color:#fff;border:none;cursor:pointer}
  </style>
</head>
<body>
<div class="container">
  <h1>Katalog Produk</h1>
  <div class="grid" id="catalog"></div>
</div>

<script>
const products = [
  {
    nama:'Headlamp Mitsubishi Pajero Sport',
    harga:2500000,
    materi:'Original OEM | Kondisi mulus 95% | Siap kirim',
    gambar:'Gambar Produk'
  },
  {
    nama:'Bumper Depan Innova Reborn',
    harga:1800000,
    materi:'Original ex asuransi | Cat mulus | Presisi',
    gambar:'Gambar Produk'
  }
];

function renderCatalog(){
  const html = products.map((p,i)=>`
    <div class="card">
      <div class="img">${p.gambar}</div>
      <h3>${p.nama}</h3>
      <div class="desc">${p.materi}</div>
      <div class="price">Rp ${p.harga.toLocaleString('id-ID')}</div>

      <input type="text" id="nama-${i}" placeholder="Nama wajib diisi">
      <textarea id="alamat-${i}" placeholder="Alamat wajib diisi"></textarea>
      <input type="text" id="hp-${i}" placeholder="Nomor HP wajib diisi">

      <div class="qty-wrap">
        <label>Jumlah:</label>
        <input type="number" id="qty-${i}" value="1" min="1">
      </div>

      <button onclick="orderProduk(${i})">Order Sekarang</button>
    </div>
  `).join('');

  document.getElementById('catalog').innerHTML = html;
}

function orderProduk(index){
  const p = products[index];
  const nama = document.getElementById(`nama-${index}`).value.trim();
  const alamat = document.getElementById(`alamat-${index}`).value.trim();
  const hp = document.getElementById(`hp-${index}`).value.trim();
  const qty = document.getElementById(`qty-${index}`).value;

  if(!nama || !alamat || !hp){
    alert('Nama, alamat, dan nomor HP wajib diisi');
    return;
  }

  const pesan = encodeURIComponent(
    `Halo, saya ingin order ${p.nama}\nNama: ${nama}\nAlamat: ${alamat}\nNo HP: ${hp}\nJumlah: ${qty}\nTotal: Rp ${(p.harga*qty).toLocaleString('id-ID')}`
  );

  window.open(`https://wa.me/6281293632293?text=${pesan}`,'_blank');
}

renderCatalog();
</script>
</body>
</html>
