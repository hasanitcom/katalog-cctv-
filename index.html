<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAIFY - Katalog Produk</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px}
    .container{max-width:1200px;margin:auto}
    .banner img{width:100%;height:300px;object-fit:cover;border-radius:16px}
    h2{text-align:center;margin:20px 0}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
    .card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .slider{position:relative;height:180px;overflow:hidden;border-radius:10px;background:#eee}
    .slide{display:none;width:100%;height:100%;object-fit:cover}
    .slide.active{display:block}
    .price{font-size:22px;font-weight:bold;color:#d00;margin:10px 0}
    .desc{font-size:14px;line-height:1.6;color:#444}
    button{width:100%;padding:12px;border:none;border-radius:8px;background:#d00;color:#fff;cursor:pointer;margin-top:10px}
    .order-box{margin-top:15px;padding-top:15px;border-top:1px solid #ddd}
    input,textarea{width:100%;padding:10px;margin-top:8px;box-sizing:border-box;border-radius:8px;border:1px solid #ccc}
    .invoice{margin-top:15px;background:#fafafa;padding:15px;border-radius:10px;border:1px solid #ddd}
    .loading{width:40px;height:40px;border:4px solid #ddd;border-top:4px solid #d00;border-radius:50%;animation:spin 1s linear infinite;margin:15px auto}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="container">
  <div class="banner">
    <img src="https://res.cloudinary.com/dmawwoupq/image/upload/v1774363111/uey3nzizi65lbgjv8gxm.jpg" alt="Banner JAIFY">
  </div>

  <h2>Katalog Produk</h2>

  <div class="grid" id="catalog"></div>
</div>

<script>
const products = [
  {
    nama:'JAIFY M2-3MP Smart Indoor CCTV',
    harga:501000,
    materi:'Camera indoor PTZ 2K+ | Panorama 360° | Two-way talk | Full color night vision | Garansi 1 tahun',
    images:['cctv1.jpg','cctv2.jpg','cctv3.jpg','cctv4.jpg','cctv5.jpg'],
    stok:25
  },
  {
    nama:'JAIFY Outdoor CCTV 5MP',
    harga:750000,
    materi:'Kamera outdoor waterproof | Night vision HD | Support mobile app | Garansi resmi',
    images:['cctv-out1.jpg','cctv-out2.jpg','cctv-out3.jpg','cctv-out4.jpg','cctv-out5.jpg'],
    stok:18
  }
];

function sliderHTML(images,id){
  return `<div class="slider">${images.map((img,i)=>`<img src="${img}" class="slide ${i===0?'active':''}" data-id="${id}">`).join('')}</div>`;
}

function renderCatalog(){
  document.getElementById('catalog').innerHTML = products.map((p,i)=>`
    <div class="card">
      ${sliderHTML(p.images,i)}
      <h3>${p.nama}</h3>
      <div class="desc">${p.materi}</div>
      <div class="price">Rp ${p.harga.toLocaleString('id-ID')}</div>
      <div>Stok: ${p.stok}</div>
      <button onclick="showOrder(${i})">Pesan</button>
      <div id="order-${i}"></div>
    </div>
  `).join('');
}

function showOrder(i){
  const p = products[i];
  document.getElementById(`order-${i}`).innerHTML = `
    <div class="order-box">
      <input type="number" id="qty-${i}" value="1" min="1" onchange="updateTotal(${i})">
      <div>Total: <b id="total-${i}">Rp ${p.harga.toLocaleString('id-ID')}</b></div>
      <input type="text" id="nama-${i}" placeholder="Nama wajib diisi">
      <textarea id="alamat-${i}" placeholder="Alamat wajib diisi"></textarea>
      <input type="text" id="hp-${i}" placeholder="Nomor HP wajib diisi">
      <button onclick="finishOrder(${i})">Selesai</button>
    </div>`;
}

function updateTotal(i){
  const qty = Number(document.getElementById(`qty-${i}`).value || 1);
  const total = qty * products[i].harga;
  document.getElementById(`total-${i}`).innerText = 'Rp ' + total.toLocaleString('id-ID');
}

function finishOrder(i){
  const p = products[i];
  const qty = Number(document.getElementById(`qty-${i}`).value || 1);
  const nama = document.getElementById(`nama-${i}`).value.trim();
  const alamat = document.getElementById(`alamat-${i}`).value.trim();
  const hp = document.getElementById(`hp-${i}`).value.trim();
  if(!nama || !alamat || !hp){ alert('Nama, alamat, dan nomor HP wajib diisi'); return; }
  const invoice = 'INV-' + Date.now();
  document.getElementById(`order-${i}`).innerHTML = `
    <div class="invoice">
      <div class="loading"></div>
      <h4>Pesanan Sedang Diproses</h4>
      <p><b>${invoice}</b></p>
      <p>${p.nama}</p>
      <p>Jumlah: ${qty}</p>
      <p>Total: Rp ${(qty*p.harga).toLocaleString('id-ID')}</p>
      <p>Nama: ${nama}</p>
      <p>Alamat: ${alamat}</p>
      <p>HP: ${hp}</p>
    </div>`;
}

setInterval(()=>{
  document.querySelectorAll('.slider').forEach(slider=>{
    const slides = slider.querySelectorAll('.slide');
    let active = [...slides].findIndex(s=>s.classList.contains('active'));
    slides[active].classList.remove('active');
    slides[(active+1)%slides.length].classList.add('active');
  });
},2500);

renderCatalog();
</script>
</body>
</html>
